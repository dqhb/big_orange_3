<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>big orange 3</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'courier new', monospace; color: #ffedd5; text-transform: lowercase; background: #431407; }
        #home-screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #f97316; z-index: 100; }
        #editor-screen { position: absolute; width: 100%; height: 100%; display: none; background: #7c2d12; z-index: 5; }
        .hidden { display: none !important; }
        h1 { font-size: 5rem; margin: 0; color: #431407; letter-spacing: -2px; }
        .menu-btn { background: #ea580c; color: white; border: none; padding: 15px 30px; margin: 10px; font-size: 1.2rem; cursor: pointer; border-radius: 8px; box-shadow: 0 4px 0 #9a3412; }
        .menu-btn:hover { background: #431407; }
        #editor-ui { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(43, 15, 7, 0.98); padding: 15px; border: 2px solid #ea580c; border-radius: 5px; width: 220px; }
        .tool-btn { background: #ea580c; color: white; border: none; padding: 6px; cursor: pointer; margin: 2px; font-size: 0.75rem; width: 45%; border-radius: 4px; }
        .tool-btn.active { background: #fde047; color: #431407; font-weight: bold; }
        .inspector { margin-top: 10px; padding-top: 10px; border-top: 1px solid #ea580c; font-size: 0.8rem; }
        .del-btn { background: #ef4444 !important; color: white; border: none; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .full-width { width: 94% !important; margin-top: 5px; }
        #level-list-container { background:rgba(0,0,0,0.3); padding:15px; border-radius:8px; width:320px; margin-top:15px; max-height: 300px; overflow-y: auto; }
        .level-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); margin-bottom: 8px; padding: 10px; border-radius: 5px; }
        input[type=range] { width: 100%; accent-color: #fde047; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1>big orange 3</h1>
        <button class="menu-btn" onclick="startNewLevel()">new game</button>
        <button class="menu-btn" onclick="enterGameCode()">enter game code</button>
        <button class="menu-btn" onclick="toggleOpenList()">open saved</button>
        <div id="level-list-container" class="hidden"></div>
    </div>

    <div id="editor-screen">
        <div id="editor-ui">
            <div id="mode-text" style="font-weight:bold; margin-bottom:5px; color:#fb923c;">mode: editing</div>
            <div id="editor-tools">
                <button class="tool-btn" onclick="setTool(this, 'block')">block</button>
                <button class="tool-btn" onclick="setTool(this, 'tramp')">bounce</button>
                <button class="tool-btn" onclick="setTool(this, 'saw')">saw</button>
                <button class="tool-btn" onclick="setTool(this, 'pusher')">beam</button>
                <button class="tool-btn" onclick="setTool(this, 'spike')">spike</button>
                <button class="tool-btn" onclick="setTool(this, 'goal')">end</button>
                <button class="tool-btn" onclick="setTool(this, 'start')">start</button>
                <button class="tool-btn active" onclick="setTool(this, 'select')" style="width:94%; background:#fb923c; margin-top:5px;">edit / move</button>
                <hr style="border:0; border-top:1px solid #431407; margin: 10px 0;">
                <button class="tool-btn" onclick="saveLevel()" style="background:#3b82f6">save</button>
                <button class="tool-btn" onclick="getGameCode()" style="background:#8b5cf6">get code</button>
                <button class="tool-btn del-btn full-width" onclick="clearCanvas()">clear canvas</button>
            </div>

            <div id="inspector" class="inspector hidden">
                <div id="size-label">size</div>
                <input type="range" id="scale-range" min="20" max="600" value="40" oninput="updateSelected()">
                <div id="rot-label">rotation / speed</div>
                <input type="range" id="speed-range" min="-314" max="314" value="0" oninput="updateSelected()">
                <button class="tool-btn del-btn full-width" onclick="deleteObj()">delete object</button>
            </div>
            
            <button class="tool-btn" id="play-btn" onclick="togglePlay()" style="background:#22c55e; width:94%; margin-top:10px; font-weight:bold;">play test</button>
            <button class="tool-btn" onclick="exitToMenu()" style="width:94%; opacity:0.7;">exit menu</button>
        </div>
        <canvas id="g"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('g');
        const ctx = canvas.getContext('2d');
        const GRID = 40;

        let mode = 'edit';
        let isSharedMode = false;
        let currentTool = 'select';
        let camX = 0, camY = 0;
        let selectedObj = null;
        let level = { objects: [], start: null };
        const p = { x: 0, y: 0, vx: 0, vy: 0, jumps: 0, rot: 0, w: 30, h: 30 };

        function startNewLevel() {
            clearCanvas(true);
            isSharedMode = false;
            document.getElementById('editor-tools').classList.remove('hidden');
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('editor-screen').style.display = 'block';
            resize();
        }

        function clearCanvas(force = false) {
            if(!force && level.objects.length > 0 && !confirm("Wipe level?")) return;
            level = { objects: [], start: null };
            selectedObj = null;
            document.getElementById('inspector').classList.add('hidden');
        }

        function getGameCode() {
            navigator.clipboard.writeText(btoa(JSON.stringify(level)));
            alert("Code copied!");
        }

        function enterGameCode() {
            const code = prompt("Paste code:");
            if (!code) return;
            try {
                level = JSON.parse(atob(code));
                isSharedMode = true;
                document.getElementById('home-screen').classList.add('hidden');
                document.getElementById('editor-screen').style.display = 'block';
                document.getElementById('editor-tools').classList.add('hidden');
                togglePlay(); resize();
            } catch(e) { alert("Invalid code!"); }
        }

        function saveLevel() {
            const name = prompt("Level name:");
            if (!name) return;
            const saves = JSON.parse(localStorage.getItem('bo4_levels') || '{}');
            saves[name] = level;
            localStorage.setItem('bo4_levels', JSON.stringify(saves));
        }

        function toggleOpenList() {
            document.getElementById('level-list-container').classList.toggle('hidden');
            renderLevelList();
        }

        function renderLevelList() {
            const container = document.getElementById('level-list-container');
            const saves = JSON.parse(localStorage.getItem('bo4_levels') || '{}');
            container.innerHTML = '';
            Object.keys(saves).forEach(k => {
                const div = document.createElement('div');
                div.className = 'level-item';
                div.innerHTML = `<b>${k}</b><div><button onclick="loadLevel('${k}')">load</button><button class="del-btn" onclick="deleteSavedLevel('${k}')">X</button></div>`;
                container.appendChild(div);
            });
        }

        function deleteSavedLevel(n) { delete JSON.parse(localStorage.getItem('bo4_levels'))[n]; renderLevelList(); }

        function loadLevel(n) {
            level = JSON.parse(localStorage.getItem('bo4_levels'))[n];
            isSharedMode = false;
            document.getElementById('editor-tools').classList.remove('hidden');
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('editor-screen').style.display = 'block';
            resize();
        }

        function setTool(btn, t) {
            currentTool = t;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedObj = null;
            document.getElementById('inspector').classList.add('hidden');
        }

        function togglePlay() {
            if(!level.start) { alert("Place a start!"); return; }
            mode = (mode === 'edit') ? 'play' : 'edit';
            document.getElementById('mode-text').innerText = "mode: " + mode;
            if(mode === 'play') { p.x = level.start.x + 5; p.y = level.start.y + 5; p.vx = p.vy = 0; }
        }

        function deleteObj() {
            level.objects = level.objects.filter(o => o !== selectedObj);
            if(level.start === selectedObj) level.start = null;
            selectedObj = null;
            document.getElementById('inspector').classList.add('hidden');
        }

        function updateSelected() {
            if(!selectedObj) return;
            const s = parseInt(document.getElementById('scale-range').value);
            const val = parseInt(document.getElementById('speed-range').value);
            if(selectedObj.w !== undefined) { selectedObj.w = selectedObj.h = s; }
            if(selectedObj.r !== undefined) { selectedObj.r = s/2; }
            
            if(['saw', 'pusher'].includes(selectedObj.type)) selectedObj.speed = val/1000;
            else selectedObj.angle = val/100;
        }

        const keys = {};
        window.onkeydown = e => { keys[e.code] = true; };
        window.onkeyup = e => keys[e.code] = false;

        function update() {
            if(mode === 'play') {
                if(keys['ArrowLeft'] || keys['KeyA']) p.vx -= 0.8;
                if(keys['ArrowRight'] || keys['KeyD']) p.vx += 0.8;
                if((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && p.jumps > 0 && !p.lock) { p.vy = -11.5; p.jumps--; p.lock = true; }
                if(!(keys['Space'] || keys['ArrowUp'] || keys['KeyW'])) p.lock = false;

                p.vx *= 0.88; p.vy += 0.55; p.x += p.vx; p.y += p.vy;
                p.rot += p.vx * 0.05; 
                camX += (p.x - canvas.width/2 - camX) * 0.1;
                camY += (p.y - canvas.height/2 - camY) * 0.1;

                level.objects.forEach(o => {
                    let dx = p.x+15 - o.x, dy = p.y+15 - o.y;
                    let rx = dx * Math.cos(-o.angle) - dy * Math.sin(-o.angle);
                    let ry = dx * Math.sin(-o.angle) + dy * Math.cos(-o.angle);

                    if(o.type === 'block') {
                        if(Math.abs(rx) < o.w/2 + 15 && Math.abs(ry) < o.h/2 + 15 && p.vy >= 0) {
                             p.y = o.y + (ry > 0 ? o.h/2+15 : -o.h/2-15); p.vy = 0; p.jumps = 2;
                        }
                    } else if(o.type === 'tramp') {
                        if(Math.abs(rx) < o.w/2 + 15 && Math.abs(ry) < o.h/2 + 15) {
                            let launchX = Math.sin(o.angle) * 18, launchY = -Math.cos(o.angle) * 18;
                            p.vx = launchX; p.vy = launchY; p.jumps = 1;
                        }
                    } else if(o.type === 'saw') {
                        o.angle += o.speed;
                        if(Math.hypot(dx, dy) < o.r + 10) togglePlay();
                    } else if(o.type === 'pusher') {
                        o.angle += o.speed;
                        if(Math.abs(rx) < o.r && Math.abs(ry) < 15) togglePlay();
                    } else if(o.type === 'spike') {
                        if(Math.abs(rx) < 15 && Math.abs(ry) < 15) togglePlay();
                    } else if(o.type === 'goal') {
                        if(Math.abs(rx) < 20 && Math.abs(ry) < 20) {
                            if(isSharedMode) { alert("Victory!"); exitToMenu(); }
                            else { alert("Test Passed!"); togglePlay(); }
                        }
                    }
                });
                if(p.y > camY + canvas.height + 1000) togglePlay();
            } else {
                if(keys['ArrowRight']) camX += 12; if(keys['ArrowLeft']) camX -= 12;
                if(keys['ArrowUp']) camY -= 12; if(keys['ArrowDown']) camY += 12;
            }
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.save(); ctx.translate(-camX, -camY);

            level.objects.forEach(o => {
                ctx.save(); ctx.translate(o.x, o.y); ctx.rotate(o.angle);
                ctx.fillStyle = "#ea580c";
                if(o.type === 'block') ctx.fillRect(-o.w/2, -o.h/2, o.w, o.h);
                else if(o.type === 'tramp') { ctx.fillStyle="#a855f7"; ctx.fillRect(-o.w/2, -o.h/2, o.w, o.h); ctx.fillStyle="#f97316"; ctx.fillRect(-o.w/2, -o.h/2, o.w, 10); }
                else if(o.type === 'saw') { for(let i=0; i<8; i++) { ctx.rotate(Math.PI/4); ctx.fillRect(-5, -o.r-10, 10, 20); } ctx.beginPath(); ctx.arc(0,0,o.r,0,Math.PI*2); ctx.fill(); }
                else if(o.type === 'pusher') { ctx.fillStyle="#fde047"; ctx.fillRect(-o.r, -10, o.r*2, 20); }
                else if(o.type === 'spike') { ctx.beginPath(); ctx.moveTo(-20, 20); ctx.lineTo(0, -20); ctx.lineTo(20, 20); ctx.fill(); }
                else if(o.type === 'goal') { ctx.fillStyle="#fbbf24"; ctx.fillRect(-20,-20,40,40); }
                ctx.restore();
                if(o === selectedObj) { ctx.strokeStyle="white"; ctx.lineWidth=2; ctx.strokeRect(o.x-o.w/2-5, o.y-o.h/2-5, (o.w||o.r*2)+10, (o.h||40)+10); }
            });

            if(level.start) { ctx.fillStyle="#22c55e"; ctx.fillRect(level.start.x-20, level.start.y-20, 40, 40); }

            ctx.save(); ctx.translate(p.x+15, p.y+15); ctx.rotate(p.rot);
            ctx.fillStyle = "#f97316"; ctx.beginPath(); ctx.arc(0,0,15,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="black"; ctx.beginPath(); ctx.arc(-6,-4,2,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(6,-4,2,0,7); ctx.fill();
            ctx.restore(); ctx.restore();
        }

        canvas.onmousedown = e => {
            if(mode !== 'edit') return;
            let mx = e.clientX + camX, my = e.clientY + camY;
            let gx = Math.floor(mx/GRID)*GRID + 20, gy = Math.floor(my/GRID)*GRID + 20;

            if(currentTool === 'select') {
                selectedObj = [...level.objects, level.start].find(o => o && Math.hypot(mx-o.x, my-o.y) < 40);
                if(selectedObj) {
                    document.getElementById('inspector').classList.remove('hidden');
                    document.getElementById('speed-range').value = (selectedObj.speed*1000 || selectedObj.angle*100 || 0);
                }
            } else if(currentTool === 'start') level.start = {x:gx, y:gy};
            else {
                let obj = {type:currentTool, x:gx, y:gy, angle:0};
                if(currentTool==='block' || currentTool==='tramp') { obj.w=40; obj.h=40; }
                if(currentTool==='saw') { obj.r=25; obj.speed=0.05; }
                if(currentTool==='pusher') { obj.r=100; obj.speed=0.03; }
                level.objects.push(obj);
            }
        };

        function exitToMenu() { document.getElementById('home-screen').classList.remove('hidden'); document.getElementById('editor-screen').style.display='none'; mode='edit'; }
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize;
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
